name: 'Fetch and Process Magazine'
description: 'Install Calibre, run Python script, and push results'
inputs:
  mag_id:
    description: 'Magazine ID (ny, te, tm)'
    required: true
  mag_name:
    description: 'Magazine Name'
    required: true
  issue_date:
    description: 'Issue Date (YYYY-MM-DD)'
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Calibre
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libegl1 \
          libopengl0 \
          libxcb-cursor0 \
          libnss3 \
          libxcomposite1 \
          libxrandr2 \
          libxtst6 \
          libxkbcommon0 \
          libgbm1 \
          libfontconfig1 \
          libgl1 \
          libpulse0 \
          libxrender1 \
          libdbus-1-3 \
          wget && \
        (sudo apt-get install -y libasound2 || sudo apt-get install -y libasound2t64)
        
        url=https://download.calibre-ebook.com/linux-installer.sh
        sudo -v && wget -nv -O- $url | sudo sh /dev/stdin

    - name: Setup WARP
      if: env.ACT != 'true'
      uses: fscarmen/warp-on-actions@v1.1
      with:
        stack: dual

    - name: Run Processing Script
      shell: bash
      run: python helper/main.py ${{ inputs.mag_id }} "${{ inputs.issue_date }}"

    - name: Upload Artifact
      if: env.ACT != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DATE }}-${{ inputs.mag_id }}
        path: converted_ebooks

    - name: Push to 'magzines' branch
      shell: bash
      run: |
        # 针对 --reuse 模式做清理，如果目录已存在则先删除
        rm -rf repo_magzines
        
        # 使用 --sparse 和 --filter=blob:none 组合，实现极轻量克隆
        git clone --filter=blob:none --branch magzines --single-branch --depth 1 --sparse https://${{ secrets.GITHUB_TOKEN || github.token }}@github.com/${{ github.repository }}.git repo_magzines
        
        cd repo_magzines
        
        # 必须先进入子仓库后再设置 identity，否则 git commit 会报错不知身份
        git config user.name "plsy1"
        git config user.email "plsy1@users.noreply.github.com"
        
        # 只针对当前杂志目录进行稀疏检出
        git sparse-checkout set ${{ env.MAG_FOLDER }}
        
        mkdir -p ${{ env.MAG_FOLDER }}
        
        if [ -d "${{ env.MAG_FOLDER }}/${{ env.DATE }}" ]; then
          echo "Directory ${{ env.MAG_FOLDER }}/${{ env.DATE }} already exists, skipping push."
          exit 0
        fi
        
        # 将生成的书籍移入
        mv ../converted_ebooks/${{ env.DATE }} ${{ env.MAG_FOLDER }}/${{ env.DATE }}
        
        git add .
        
        if [[ $(git diff --cached --quiet || echo "changes") == "changes" ]]; then
          git commit -m "Update ${{ inputs.mag_name }} - ${{ env.DATE }}"
          git push origin magzines
        else
          echo "No changes to push."
        fi
